<body class="page-contact">
    <header id="top">
        <ul class="skip-links">

    <main id="main">

        <!-- ── Hero ── -->
        <section class="contact-hero" aria-labelledby="contact-title">
            <p class="contact-overline">Reach Out</p>
            <h1 class="contact-headline" id="contact-title">
                Let's
                <em>Connect.</em>
            </h1>
            <!-- Decorative: small bordered square + thick rule -->
            <div class="contact-deco" aria-hidden="true">
                <span class="contact-deco-square"></span>
                <div class="contact-deco-rule"></div>
            </div>
        </section>

        <!-- ── Social Links ── -->
        <section class="contact-links" aria-label="Social media links">
            <a class="contact-link-row"
               href="http://www.linkedin.com/in/falinwang"
               target="_blank"
               rel="noopener noreferrer">
                <span class="link-index" aria-hidden="true">01</span>
                <span class="link-platform">LinkedIn</span>
                <span class="link-handle">/in/falinwang</span>
                <span class="link-arrow" aria-hidden="true">→</span>
            </a>
            <a class="contact-link-row"
               href="https://medium.com/@roywannago"
               target="_blank"
               rel="noopener noreferrer">
                <span class="link-index" aria-hidden="true">02</span>
                <span class="link-platform">Medium</span>
                <span class="link-handle">@roywannago</span>
                <span class="link-arrow" aria-hidden="true">→</span>
            </a>
            <a class="contact-link-row"
               href="https://github.com/falinwang"
               target="_blank"
               rel="noopener noreferrer">
                <span class="link-index" aria-hidden="true">03</span>
                <span class="link-platform">GitHub</span>
                <span class="link-handle">/falinwang</span>
                <span class="link-arrow" aria-hidden="true">→</span>
            </a>
