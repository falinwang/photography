<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <!-- Monochrome typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Source+Serif+4:opsz,wght@8..60,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

    <link rel="Shortcut Icon" type="image/x-icon" href="./img/roynana.png" />
    <link rel="stylesheet" href="css/mystyle.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/index-redesign.css">

    <title>Roy Wang | UX Designer</title>
</head>

<body class="page-home">
    <div class="home-split">

        <!-- ── Left: typography panel ── -->
        <div class="home-left">
            <header id="top">
                <ul class="skip-links">
                    <li><a href="#nav">Skip to navigation</a></li>
                    <li><a href="#main">Skip to the main content</a></li>
                </ul>
                <nav id="nav" aria-label="Main navigation">
                    <div class="logo">
                        <a href="index.html" class="logo-text" aria-label="Roy Wang — Home">RW</a>
                    </div>
                    <ul>
                        <li><a class="current-page" href="index.html" aria-current="page">Home</a></li>
                        <li><a href="photography.html">Photography</a></li>
                        <li><a href="about.html">About</a></li>
                        <li><a href="contact.html">Contact</a></li>
                    </ul>
                </nav>
            </header>

            <main id="main" class="home-main">
                <p class="home-overline">Photography &amp; Design</p>
                <h1 class="home-headline">
                    Roy
                    <em>Wang.</em>
                </h1>
                <div class="home-deco" aria-hidden="true">
                    <span class="home-deco-square"></span>
                    <div class="home-deco-rule"></div>
                </div>
                <p class="home-role">UX Designer</p>
                <p class="home-tagline">Passionate about HealthTech, user-centered design, and Milk Tea.</p>
                <nav class="home-nav-links" aria-label="Site sections">
                    <a href="photography.html">Photography <span>→</span></a>
                    <a href="about.html">About <span>→</span></a>
                    <a href="contact.html">Contact <span>→</span></a>
                </nav>
            </main>

        </div>

        <!-- ── Right: rotating slideshow ── -->
        <div class="home-right" aria-hidden="true">
            <img class="home-slide home-slide--active" src="img/roylake_b.jpg" alt="">
            <img class="home-slide" src="img/roymountain_b.jpg" alt="">
            <img class="home-slide" src="img/royocean_b.jpg" alt="">
            <img class="home-slide" src="img/autraf.jpg" alt="">
            <img class="home-slide" src="img/aubar.jpg" alt="">
            <img class="home-slide" src="img/aulav.jpg" alt="">
            <img class="home-slide" src="img/roysnow.jpg" alt="">
            <img class="home-slide" src="img/autrain.jpg" alt="">
            <img class="home-slide" src="img/sing.jpg" alt="">
        </div>

    </div>

    <footer>
        <p>Roy Wang &copy; 2026 &mdash; <a href="#top">Back to Top</a></p>
    </footer>

    <script>
        (function () {
            var slides = document.querySelectorAll('.home-slide');
            var current = 0;
            setInterval(function () {
                slides[current].classList.remove('home-slide--active');
                current = (current + 1) % slides.length;
                slides[current].classList.add('home-slide--active');
            }, 4500);
        })();
    </script>
</body>

</html>
